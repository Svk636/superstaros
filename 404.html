<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Superstar OS — Redirecting</title>
<style>
body { background: #080808; color: #c9a84c; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; }
.msg { font-size: 12px; letter-spacing: 3px; }
</style>
<script>
// GitHub Pages SPA redirect — sends path to index.html via sessionStorage
var path = window.location.pathname;
sessionStorage.setItem('gh_redirect', path);
window.location.replace(window.location.origin + window.location.pathname.split('/').slice(0,2).join('/') + '/');
</script>
</head>
<body><div class="msg">REDIRECTING...</div></body>
</html>
